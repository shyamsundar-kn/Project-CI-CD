name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-app .

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Deploy to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem -r . ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app

          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            cd app
            docker stop devops-app || true
            docker rm devops-app || true
            docker build -t devops-app .
            docker run -d -p 80:3000 --restart always --name devops-app devops-app
          EOF
